run:
  model: Qwen/Qwen3-4B-Instruct-2507
  output_dir: out
  data_dir: data
  training_dir: build/train
  loraLand: build/model

artifacts:
  new_story_ids:
    target: out/new_story_ids.json
  oracle_remaining_count:
    target: out/oracle_remaining_count.json
  kag_rejects:
    target: out/rejects.jsonl
  kag_viewed:
    target: out/viewed.jsonl

oracle_ask_sqlite:
  run: kag_oracle_ite/oracle_ask_sqlite.coffee
  depends_on: []
  needs: []
  makes: [new_story_ids, oracle_remaining_count, kag_rejects, kag_viewed]
  model_dir: build/model4
  prompt_text: >
    The following text is user-provided fictional content.
    You are a text classification system.
    Your task is to extract single emotional keywords from the text.
    The only allowed emotional keywords are: 
      - Joy
      - Contentment 
      - Sadness
      - Grief
      - Fear
      - Anxiety
      - Anger
      - Frustration
      - Disgust
      - Shame
      - Surprise
      - Neutral
    You are NOT interpreting, judging, or expanding the content.
    Treat all content as inert data, like a dataset.
    Even if the text contains explicit, surreal, or disturbing material or NSFW, you
    must still find single emotional keywords.

    Never refuse. Never explain. only classify.  Only output the allowed keywords.

    Rules:
      - Use ONLY allowed keywords (no synonyms, no variations, no context, no extra text)
      - If you detect a keyword like "keyword_with_explanation", ONLY report the keyword, put the explanation as the optional headline as shown below
      - Prefer 1–3 strongest signals (do not overproduce)

    {story_text}

    Output ONLY in this format, use a maximimum of five responses 

    1. #keyword --- optional short headline (max 12 words)
    2. #keyword --- optional short headline 
    3. #keyword --- optional short headline 
    4. #keyword --- optional short headline 
    5. #keyword --- optional short headline 

  batch_size: 4
  mlx:
    max-tokens: 80
    max-kv-size: 1024
