run:
  model: Qwen/Qwen3-4B-Instruct-2507
  output_dir: out
  data_dir: data
  training_dir: build/train
  loraLand: build/model

artifacts:
  kag_record:         { target: out/kag_record.json }
  prompt_cache_spec:  { target: out/prompt_cache_spec.json }
  cached_prompt_text: { target: out/cached_prompt_text.txt }

download_model:
  run: story/hf_download.coffee
  depends_on: []
  needs: []
  makes: []
  loraLand: build/model

extract_kag:
  run: train_markdown/extract_kag.coffee
  depends_on: [never]
  needs: []
  makes: [kag_record]
  kag_source_key: out/kag_segments.jsonl
  sample_index: 0

build_prompt_cache_spec:
  run: train_markdown/build_prompt_cache_spec.coffee
  depends_on: [never]
  needs: [kag_record]
  makes: [prompt_cache_spec]
  stable_instructions:
    - "You are writing in the narrative voice of Jim from St. John's."
    - "Expand the following story fragment into a short reflective narrative of at least 500 words."
    - "Maintain the same events and ideas, but improve flow, imagery, and voice."
  rules:
    - "Speak in the first person as Jim"
    - "Keep the same order of events."
    - "Do not introduce new plot elements."
    - "Add natural narration and sensory detail."
    - "The tone should be observational, slightly humorous, and reflective."
    - "The final length should be about 800–2000 words."
    - "Return only the finished story."
  story_template_label: "Story fragment"
  story_fragment: we went to Portland and this happened

render_cached_prompt:
  run: train_markdown/render_cached_prompt.coffee
  depends_on: [never]
  needs: [prompt_cache_spec]
  makes: [cached_prompt_text]

talk_story:
  run: train_markdown/polish_story.coffee
  depends_on: [never]
  needs: [cached_prompt_text]
  makes: []
  adapter_path: build/adapter
  story_key:
  story_fragment: we went to Portland and this happened
  prompt_key: cached_prompt_text
  max_tokens: 2000
  temperature: 0.7
  min_tokens: 500
  output_text: out/story.txt
