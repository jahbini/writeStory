run:
  model: Qwen/Qwen3-4B-Instruct-2507
  output_dir: out
  data_dir: data
  training_dir: build/train
  loraLand: build/model
  debug_s: true
  debug_mlx: false

artifacts:
  stories_md:
    source: data/jim.md
  marshalled_stories:
    target: data/marshalled_stories.jsonl
  new_story_ids:
    target: out/new_story_ids.json
  kag_emotions:
    target: out/kag_emotions.jsonl
  kag_viewed:
    target: out/viewed.jsonl
  train_rows:
    target: build/train/train.jsonl
  valid_rows:
    target: build/train/valid.jsonl
  test_rows:
    target: build/train/test.jsonl
download_model:
  run: story/hf_download.coffee
  depends_on: []
  needs: []
  makes: []
  loraLand: build/model

md2segments:
  run: train_markdown/md2segments.coffee
  depends_on: [download_model]
  needs: [stories_md]
  makes: [marshalled_stories]
  split_mode: story

oracle_ask:
  run: kag_oracle/oracle_ask.coffee
  depends_on: [md2segments]
  needs: [marshalled_stories]
  makes: [new_story_ids, kag_emotions, kag_viewed]
  prompt_prefix: |
    You are a classifier. Given this sample <<< 
  prompt_suffix: |
    >>> classify each emotion as:
    "none", "mild", "moderate", "strong", or "extreme".

    Return exactly:
    {
      "anger": classification,
      "fear": classification,
      "joy": classification,
      "sadness": classification,
      "desire": classification,
      "curiosity": classification
    }
  batch_size: 4
  max_tokens: 1000

prepare_training_data:
  run: train_markdown/prepare_training_data.coffee
  depends_on: [oracle_ask]
  needs: [marshalled_stories, new_story_ids]
  makes: [train_rows, valid_rows, test_rows]

lora_train:
  run: train_markdown/lora_train.coffee
  depends_on: [prepare_training_data]
  needs: [train_rows, valid_rows, test_rows]
  makes: []
  test_only: false
  batch_size: 1
  iters: 200
  max_seq_length: 1024
  learning_rate: 0.00005
  adapter_path: build/adapter
  resume_adapter_file: build/adapter/adapters.safetensors
  stdout_text: out//lora_train.txt

talk_story:
  run: train_markdown/polish_story.coffee
  depends_on: [lora_train]
  needs: []
  makes: []
  adapter_path: build/adapter
  story_key:
  story_fragment: we went to Portland and this happened
  max_tokens: 2000
  temperature: 0.7
  min_tokens: 500
  output_text: out/story.txt

rotate_merged:
  run: train_markdown/rotate_merged.coffee
  depends_on: [oracle_ask]
  needs: [kag_viewed]
  makes: [train_rows, valid_rows, test_rows]
  train_prompt_prefix: "Continue in the same voice and mannner as the text below."
