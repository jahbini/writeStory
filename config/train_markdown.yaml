run:
  model: TinyLlama/TinyLlama-1.1B-Chat-v1.0
  output_dir: out/train_markdown
  data_dir: data/train_markdown
  training_dir: build/train_markdown

download_model:
  run: story/hf_download.coffee
  depends_on: []
  needs: []
  makes: []
  loraLand: build/model

md2segments:
  run: train_markdown/md2segments.coffee
  depends_on: [download_model]
  needs: []
  makes: []
  stories_md: data/jim.md
  marshalled_stories: data/train_markdown/marshalled_stories.jsonl
  split_mode: story

oracle_ask:
  run: train_markdown/oracle_ask.coffee
  depends_on: [md2segments]
  needs: []
  makes: []
  marshalled_stories: data/train_markdown/marshalled_stories.jsonl
  kag_emotions: data/train_markdown/kag_emotions.jsonl
  batch_size: 4
  max_tokens: 1000

reply_merge:
  run: train_markdown/reply_merge.coffee
  depends_on: [oracle_ask]
  needs: []
  makes: []
  marshalled_stories: data/train_markdown/marshalled_stories.jsonl
  kag_emotions: data/train_markdown/kag_emotions.jsonl
  merged_segments: data/train_markdown/merged_segments.jsonl

rotate_merged:
  run: train_markdown/rotate_merged.coffee
  depends_on: [reply_merge]
  needs: []
  makes: []
  merged_segments: data/train_markdown/merged_segments.jsonl
  train_file: build/train_markdown/train.jsonl
  valid_file: build/train_markdown/valid.jsonl

lora_train:
  run: train_markdown/lora_train.coffee
  depends_on: [rotate_merged]
  needs: []
  makes: []
  batch_size: 1
  iters: 200
  max_seq_length: 1024
  learning_rate: 0.00005
  train_file: build/train_markdown/train.jsonl
  valid_file: build/train_markdown/valid.jsonl
  adapter_path: build/train_markdown/adapter
  stdout_text: out/train_markdown/lora_train.txt

talk_story:
  run: train_markdown/talk_story.coffee
  depends_on: [lora_train]
  needs: []
  makes: []
  adapter_path: build/train_markdown/adapter
  prompt_text: we went to Portland and this happened
  max_tokens: 800
  top_p: 0.9
  temperature: 0.7
  output_text: out/train_markdown/talk_story.txt
