run:
  model: TinyLlama/TinyLlama-1.1B-Chat-v1.0
  output_dir: out
  data_dir: data
  training_dir: build/train
  loraLand: build/model

artifacts:
  kag_record:         { target: out/kag_record.json }
  prompt_cache_spec:  { target: out/prompt_cache_spec.json }
  cached_prompt_text: { target: out/cached_prompt_text.txt }

download_model:
  run: story/hf_download.coffee
  depends_on: []
  needs: []
  makes: []
  loraLand: build/model

md2segments:
  run: train_markdown/md2segments.coffee
  depends_on: [download_model]
  needs: []
  makes: []
  stories_md: data/jim.md
  marshalled_stories: data//marshalled_stories.jsonl
  split_mode: story

oracle_ask:
  run: train_markdown/oracle_ask.coffee
  depends_on: [md2segments]
  needs: []
  makes: []
  marshalled_stories: data//marshalled_stories.jsonl
  new_story_ids: out/new_story_ids.json
  kag_emotions: out//kag_emotions.jsonl
  kag_viewed: out/viewed.jsonl
  batch_size: 4
  max_tokens: 1000

prepare_training_data:
  run: train_markdown/prepare_training_data.coffee
  depends_on: [oracle_ask]
  needs: []
  makes: []
  marshalled_stories: data/marshalled_stories.jsonl
  new_story_ids: out/new_story_ids.json
  train_file: build/train/train.jsonl
  valid_file: build/train/valid.jsonl
  test_file: build/train/test.jsonl


extract_kag:
  run: train_markdown/extract_kag.coffee
  depends_on: [prepare_kag_segments]
  needs: []
  makes: [kag_record]
  kag_source_key: out/kag_segments.jsonl
  sample_index: 0


prepare_kag_segments:
  run: train_markdown/prepare_kag_segments.coffee
  depends_on: [oracle_ask]
  needs: []
  makes: []
  marshalled_stories: data//marshalled_stories.jsonl
  kag_emotions: out//kag_emotions.jsonl
  kag_segments: out/kag_segments.jsonl

lora_train:
  run: train_markdown/lora_train.coffee
  depends_on: [prepare_training_data]
  needs: []
  makes: []
  batch_size: 1
  iters: 200
  max_seq_length: 1024
  learning_rate: 0.00005
  train_file: build/train/train.jsonl
  valid_file: build/train/valid.jsonl
  test_file: build/train/test.jsonl
  adapter_path: build/adapter
  resume_adapter_file: build/adapter/adapters.safetensors
  stdout_text: out//lora_train.txt

build_prompt_cache_spec:
  run: train_markdown/build_prompt_cache_spec.coffee
  depends_on: [lora_train, extract_kag]
  needs: [kag_record]
  makes: [prompt_cache_spec]
  story_fragment: we went to Portland and this happened

render_cached_prompt:
  run: train_markdown/render_cached_prompt.coffee
  depends_on: [build_prompt_cache_spec]
  needs: [prompt_cache_spec]
  makes: [cached_prompt_text]

talk_story:
  run: train_markdown/polish_story.coffee
  depends_on: [render_cached_prompt]
  needs: [cached_prompt_text]
  makes: []
  adapter_path: build/adapter
  story_key:
  story_fragment: we went to Portland and this happened
  prompt_key: cached_prompt_text
  max_tokens: 2000
  temperature: 0.7
  min_tokens: 500
  output_text: out/story.txt
