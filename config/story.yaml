run:
  model: TinyLlama/TinyLlama-1.1B-Chat-v1.0
  loraLand: build/model
  output_dir: out
  data_dir: data
  params_dir: params

artifacts:
  story_library:        { target: out/story_library.json }
  story_recipe:         { target: out/story_recipe.json }
  story_parts:          { target: out/story_parts.json }
  expanded_story_parts: { target: out/expanded_story_parts.json }
  story:                { target: out/story.json }
  story_polished:       { target: out/story_polished.json }

download_model:
  run: story/hf_download.coffee
  depends_on: []
  needs: []
  makes: []

load_library:
  run: jim/load_library.coffee
  depends_on: [download_model]
  needs: []
  makes: [story_library]
  library_file: data/jim_story_library.yaml

select_story_recipe:
  run: jim/select_story_recipe.coffee
  depends_on: [load_library]
  needs: [story_library]
  makes: [story_recipe]
  story_id: jim_0001

resolve_story_parts:
  run: jim/resolve_story_parts.coffee
  depends_on: [select_story_recipe]
  needs: [story_library, story_recipe]
  makes: [story_parts]

expand_story_parts:
  run: jim/expand_story_parts.coffee
  depends_on: [resolve_story_parts]
  needs: [story_parts]
  makes: [expanded_story_parts]

assemble_story:
  run: jim/assemble_story.coffee
  depends_on: [expand_story_parts]
  needs: [expanded_story_parts]
  makes: [story]

polish_story:
  run: jim/polish_story.coffee
  depends_on: [assemble_story]
  needs: [story]
  makes: [story_polished]
  story_key: story
  adapter_path: build/adapter
  temperature: 0.7
  max_tokens: 2000
  min_tokens: 500
  output_text: out/story.txt
