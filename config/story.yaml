run:
  model: Qwen/Qwen3-4B-Instruct-2507
  loraLand: build/model
  output_dir: out
  data_dir: data
  params_dir: params

artifacts:
  story_library:        { target: out/story_library.json }
  story_recipe:         { target: out/story_recipe.json }
  story_parts:          { target: out/story_parts.json }
  expanded_story_parts: { target: out/expanded_story_parts.json }
  story:                { target: out/story.json }
  story_text:           { target: out/story.txt }

download_model:
  run: story/hf_download.coffee
  depends_on: []
  needs: []
  makes: []

load_library:
  run: story/load_library.coffee
  depends_on: [download_model]
  needs: []
  makes: [story_library]
  library_file: data/jim_story_library.yaml

select_story_recipe:
  run: story/select_story_recipe.coffee
  depends_on: [load_library]
  needs: [story_library]
  makes: [story_recipe]
  story_id: jim_0001

resolve_story_parts:
  run: story/resolve_story_parts.coffee
  depends_on: [select_story_recipe]
  needs: [story_library, story_recipe]
  makes: [story_parts]

expand_story_parts:
  run: story/expand_story_parts.coffee
  depends_on: [resolve_story_parts]
  needs: [story_parts]
  makes: [expanded_story_parts]

assemble_story:
  run: story/assemble_story.coffee
  depends_on: [expand_story_parts]
  needs: [expanded_story_parts]
  makes: [story]

polish_story:
  run: train_markdown/polish_story.coffee
  depends_on: [assemble_story]
  needs: [story]
  makes: [story_text]
  story_key: story
  prompt_text: |
    You are writing in the narrative voice of Jim from St. John's.

    Expand the following story fragment into a short reflective narrative of at least 500 words.
    Maintain the same events and ideas, but improve flow, imagery, and voice.

    Rules:
    - Speak in the first person as Jim
    - Keep the same order of events.
    - Do not introduce new plot elements.
    - Add natural narration and sensory detail.
    - The tone should be observational, slightly humorous, and reflective.
    - The final length should be about 800–2000 words.

    Return only the finished story.
    Story fragment:

    {{story_text}}
  adapter_path: build/adapter
  mlx:
    generate:
      temp: 0.7
      max-tokens: 2000
      min-tokens: 500
