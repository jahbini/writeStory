run:
  model: Qwen/Qwen3-4B-Instruct-2507
  output_dir: out
  data_dir: data
  training_dir: build/train
  loraLand: build/model
  debug_s: true
  debug_mlx: false

artifacts:
  stories_md:
    source: data/jim.md
  marshalled_stories:
    target: data/marshalled_stories.jsonl
  new_story_ids:
    target: out/new_story_ids.json
  trained_story_ids:
    target: out/trained_story_ids.json
  train_rows:
    target: build/train/train.jsonl
  valid_rows:
    target: build/train/valid.jsonl
  test_rows:
    target: build/train/test.jsonl
  lora_stdout:
    target: out/lora_train.txt
  story_text:
    target: out/story.txt

download_model:
  run: story/hf_download.coffee
  depends_on: []
  needs: []
  makes: []
  loraLand: build/model

md2segments:
  run: train_markdown/md2segments.coffee
  depends_on: [download_model]
  needs: [stories_md]
  makes: [marshalled_stories]
  split_mode: paragraph

select_training_batch:
  run: train_markdown/select_training_batch.coffee
  depends_on: [md2segments]
  needs: [marshalled_stories]
  makes: [new_story_ids]
  trained_story_ids_path: out/trained_story_ids.json
  batch_size: 4

prepare_training_data:
  run: train_markdown/prepare_training_data.coffee
  depends_on: [select_training_batch]
  needs: [marshalled_stories, new_story_ids]
  makes: [train_rows, valid_rows, test_rows]

lora_train:
  run: train_markdown/lora_train.coffee
  depends_on: [prepare_training_data]
  needs: [train_rows, valid_rows, test_rows]
  makes: [lora_stdout]
  test_only: false
  adapter_path: build/adapter
  resume_adapter_file: build/adapter/adapters.safetensors
  mlx:
    lora:
      batch-size: 1
      iters: 200
      max-seq-length: 1024
      learning-rate: 0.00005

record_trained_batch:
  run: train_markdown/record_trained_batch.coffee
  depends_on: [lora_train]
  needs: [new_story_ids]
  makes: [trained_story_ids]

talk_story:
  run: train_markdown/polish_story.coffee
  depends_on: [record_trained_batch]
  needs: []
  makes: [story_text]
  adapter_path: build/adapter
  story_key:
  story_fragment: we went to Portland and this happened
  prompt_text: |
    You are writing in the narrative voice of Jim from St. John's.

    Expand the following story fragment into a short reflective narrative of at least 500 words.
    Maintain the same events and ideas, but improve flow, imagery, and voice.

    Rules:
    - Speak in the first person as Jim
    - Keep the same order of events.
    - Do not introduce new plot elements.
    - Add natural narration and sensory detail.
    - The tone should be observational, slightly humorous, and reflective.
    - The final length should be about 800–2000 words.

    Return only the finished story.
    Story fragment:

    {{story_text}}
  mlx:
    generate:
      max-tokens: 2000
      temp: 0.7
      min-tokens: 500
