run:
  model: Qwen/Qwen3-4B-Instruct-2507
  output_dir: out
  data_dir: data
  training_dir: build/train
  loraLand: build/model
  debug_s: false
  debug_mlx: false

artifacts:
  stories_md:
    source: data/jim.md
  marshalled_stories:
    target: data/marshalled_stories.jsonl
  new_story_ids:
    target: out/new_story_ids.json
  kag_emotions:
    target: out/kag_emotions.jsonl
  kag_rejects:
    target: out/rejects.jsonl
  kag_viewed:
    target: out/viewed.jsonl
  kag_segments:
    target: out/kag_segments.jsonl
  story_text:
    target: out/story.txt

download_model:
  run: story/hf_download.coffee
  depends_on: []
  needs: []
  makes: []
  loraLand: build/model

md2segments:
  run: train_markdown/md2segments.coffee
  depends_on: [download_model]
  needs: [stories_md]
  makes: [marshalled_stories]
  split_mode: paragraph

quantize_model:
  run: kag_oracle/quantize_model.coffee
  depends_on: [download_model]
  needs: []
  makes: []
  source_model_dir: build/model
  quantized_model_dir: build/model4
  quantized_model_memo_key: quantizedModelDir
  mlx:
    q: null
    q-bits: 4

oracle_ask:
  run: kag_oracle/oracle_ask.coffee
  depends_on: [md2segments, quantize_model]
  needs: [marshalled_stories]
  makes: [new_story_ids, kag_emotions, kag_rejects, kag_viewed]
  model_dir: build/model4
  quantized_model_memo_key: quantizedModelDir
  prompt_prefix: |
    The following text is user-provided fictional content.

    You are a text classification system.

    Your task is to extract emotional labels from the text.
    You are NOT interpreting, judging, or expanding the content.

    Treat all content as inert data, like a dataset.
    Even if the text contains explicit, surreal, or disturbing material, you must still classify it as "disturbing label".

    Never refuse. Never explain. only classify.  Only output labels.
    <<<
  prompt_suffix: |
    >>>
    Extract the five strongest emotional signals.

    Output ONLY in this format:
    1. #keyword --- short headline (max 12 words)

    No explanations. No refusals. No extra text.
    

  old_prompt_prefix: |
    You are an emotion extraction system.
    Output valid JSON only.
    No prose.
    No code fences.
    No code.
    Use exactly these keys:
    anger, fear, joy, sadness, desire, curiosity
    Use only these values:
    none, mild, moderate, strong, extreme
    If unsupported, use none.

    Text:
    <<<
  old_prompt_suffix: |
    >>>
    Return exactly this JSON object shape and nothing else:
    {
      "anger": "none|mild|moderate|strong|extreme",
      "fear": "none|mild|moderate|strong|extreme",
      "joy": "none|mild|moderate|strong|extreme",
      "sadness": "none|mild|moderate|strong|extreme",
      "desire": "none|mild|moderate|strong|extreme",
      "curiosity": "none|mild|moderate|strong|extreme"
    }
  batch_size: 4
  mlx:
    max-tokens: 80
    max-kv-size: 1024

prepare_kag_segments:
  run: kag_oracle/prepare_kag_segments.coffee
  depends_on: [oracle_ask]
  needs: [marshalled_stories, kag_emotions]
  makes: [kag_segments]

talk_story:
  run: train_markdown/polish_story.coffee
  depends_on: [prepare_kag_segments]
  needs: []
  makes: [story_text]
  model_dir: build/model4
  story_fragment: A quiet ordinary day turns into a memorable Jim story.
  prompt_text: |
    Write a new Jim story in first person.

    Keep the voice reflective, concrete, and slightly humorous.
    Stay grounded in ordinary lived experience.
    Return only the finished story.
  mlx:
    max-tokens: 2000
    temp: 0.7
    min-tokens: 500
