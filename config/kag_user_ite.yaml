run:
  model: Qwen/Qwen3-4B-Instruct-2507
  output_dir: out
  data_dir: data
  training_dir: build/train
  loraLand: build/model
  debug_s: false
  debug_mlx: false
  debug_sql: false

artifacts:
  selected_story_id:
    target: out/selected_story_id.json
  story:
    target: out/story.json
  kag_prompt_text:
    target: out/kag_prompt_text.txt
  story_generate_raw:
    target: out/story_generate_raw.txt
  story_text:
    target: out/story.txt

download_model:
  run: story/hf_download.coffee
  depends_on: []
  needs: []
  makes: []
  loraLand: build/model

quantize_model:
  run: kag_oracle/quantize_model.coffee
  depends_on: [download_model]
  needs: []
  makes: []
  source_model_dir: build/model
  quantized_model_dir: build/model4
  quantized_model_memo_key: quantizedModelDir
  mlx:
    q: null
    q-bits: 4

select_story_sqlite:
  run: kag_user_ite/select_story_sqlite.coffee
  depends_on: []
  needs: []
  makes: [selected_story_id]
  story_id: sql_test_with_kag

create_story_parts_sqlite:
  run: kag_user_ite/create_story_parts_sqlite.coffee
  depends_on: [select_story_sqlite]
  needs: [selected_story_id]
  makes: []

expand_story_parts_sqlite:
  run: kag_user_ite/expand_story_parts_sqlite.coffee
  depends_on: [create_story_parts_sqlite]
  needs: [selected_story_id]
  makes: []

assemble_story_sqlite:
  run: kag_user_ite/assemble_story_sqlite.coffee
  depends_on: [expand_story_parts_sqlite]
  needs: [selected_story_id]
  makes: [story]

build_kag_prompt_sqlite:
  run: kag_user_ite/build_kag_prompt_sqlite.coffee
  depends_on: [assemble_story_sqlite]
  needs: [selected_story_id, story]
  makes: [kag_prompt_text]

talk_story:
  run: train_markdown/polish_story.coffee
  depends_on: [build_kag_prompt_sqlite, quantize_model]
  needs: [story, kag_prompt_text]
  makes: [story_text, story_generate_raw]
  model_dir: build/model4
  raw_output_key: story_generate_raw
  story_key: story
  prompt_key: kag_prompt_text
  mlx:
    max-tokens: 2000
    temp: 0.7
    min-tokens: 500
