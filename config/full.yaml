run:
  model: Qwen/Qwen3-4B-Instruct-2507
  output_dir: out
  data_dir: data
  eval_dir: eval_out
  debug_s: true
  debug_mlx: false

artifacts:
  stories_md:
    source: data/jim.md
  train_rows:
    target: data/train.jsonl
  valid_rows:
    target: data/valid.jsonl
  data_contract:
    target: data/data_contract.json
  data_catalog:
    target: data/data_catalog.json
  data_report:
    target: data/data_report.json
  prompt_policy:
    target: data/prompt_policy.json
  experiments_csv:
    target: out/experiments.csv
  run_manifest:
    target: out/run_manifest.yaml
  artifacts_registry:
    target: out/artifacts.json
  lora_stdout:
    target: out/train_stdout.txt
  generation_rows:
    target: eval_out/generations.jsonl
  generation_groups:
    target: eval_out/generations.yaml
  ablation_rows:
    target: eval_out/ablation_generations.jsonl
  ablation_groups:
    target: eval_out/ablation_generations.yaml
  ablation_summary_json:
    target: eval_out/ablation_summary.json
  ablation_summary_csv:
    target: eval_out/ablation_summary.csv
  entropy_tokens:
    target: eval_out/entropy_tokens.jsonl
  entropy_summary:
    target: eval_out/entropy_summary.csv
  out_kag_rows:
    target: out/out_kag.jsonl

manifest:
  run: full/manifest.coffee
  depends_on: []
  needs: []
  makes: [run_manifest]
  seed: 7

fetch_hf_dataset:
  desc: "Download and preprocess a HuggingFace dataset for fine-tuning."
  run: full/fetch_hf_dataset.coffee
  depends_on: []
  needs: []
  makes: [train_rows, valid_rows, data_contract, data_catalog]
  hf_dataset: asuender/motivational-quotes
  subset: quotes
  mode: notplain
  valid_fract: 0.10
  min_words: 5
  max_words: 60
  seed: 42

prepare_data:
  run: full/prepare_data.coffee
  depends_on: [fetch_hf_dataset]
  needs: [data_contract, train_rows, valid_rows]
  makes: [data_report]

prepare_prompts:
  run: full/prepare_prompts.coffee
  depends_on: [fetch_hf_dataset]
  needs: [data_contract, train_rows]
  makes: [prompt_policy]
  template_name: icl_minimal
  stop_strings: ["<|endoftext|>", "\n\n"]
  use_eos_token: false

prepare_experiments:
  run: full/prepare_experiments.coffee
  depends_on: [prepare_data]
  needs: [data_contract, data_catalog, data_report]
  makes: [experiments_csv]
  batch_size: 1
  grad_accum: 8
  max_seq_length: 1024
  learning_rate: 1e-4
  bf16: true
  iters_override: 0
  epochs: 1
  seeds:
    - 11
    - 22
    - 33

register:
  run: full/register.coffee
  depends_on: [prepare_experiments]
  needs: [experiments_csv]
  makes: [artifacts_registry]

train:
  run: full/train.coffee
  depends_on: [manifest, register]
  needs: [experiments_csv]
  makes: [lora_stdout]
  dry_run: false
  only_model_id: ""
  only_row: "None"
  steps_per_report: 10
  steps_per_eval: 50
  val_batches: 25

fuse:
  run: full/fuse.coffee
  depends_on: [train]
  needs: [artifacts_registry]
  makes: [artifacts_registry]
  do_fuse: true
  dry_run: false
  mlx:
    convert:
      q: null
      q-bits: 4
      q-group-size: 32
      dtype: float16

snapshot:
  run: full/snapshot.coffee
  depends_on: [fuse]
  needs: [artifacts_registry]
  makes: [generation_rows, generation_groups]
  prompts:
    - "Finish this proverb: 'A stitch in time...'"
    - "What lesson would a wise elder share about patience?"
  max_new_tokens: 64
  only_model_id: ""
  mlx:
    generate:
      temp: 0.7

examination:
  run: full/examination.coffee
  depends_on: [fuse]
  needs: [artifacts_registry]
  makes: [ablation_rows, ablation_groups]
  prompts:
    - "Share an important thought."
    - "What truth do we often overlook?"
  max_new_short: 64
  max_new_long: 128
  only_model_id: ""
  mlx:
    generate:
      temp: 0.7

sanity:
  run: full/sanity.coffee
  depends_on: [examination]
  needs: [ablation_rows]
  makes: [ablation_summary_json, ablation_summary_csv]

entropy:
  run: full/entropy.coffee
  depends_on: [snapshot]
  needs: [generation_rows, artifacts_registry]
  makes: [entropy_tokens, entropy_summary]
  max_new_tokens: 128
  stop_strings: ["\n\n", "==="]

prepare_outmd_kag:
  run: full/prepare_outmd_kag.coffee
  depends_on: []
  needs: [stories_md]
  makes: [out_kag_rows]

crawl_for_voice:
  run: full/crawl_for_voice.coffee
  depends_on: []
  needs: []
  makes: []
  base: celarien.com
  output_key: crawled_voice
  valid_fraction: 0.1
  min_story_words: 50
  max_pages: 1000
  pause_sec: 0.5
  user_agent: Mozilla/5.0
  request_timeout: 15000
