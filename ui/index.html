<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pipeline Monitor</title>
  <style>
    :root {
      --bg: #f2efe8;
      --ink: #1d221f;
      --muted: #6b726d;
      --panel: #fffdf8;
      --line: #d7d1c2;
      --accent: #145a46;
      --warn: #8a5a00;
      --bad: #8a1f2a;
      --good: #1f6a3a;
      --mono: "SFMono-Regular", Menlo, Consolas, monospace;
      --sans: "Avenir Next", "Helvetica Neue", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--sans);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, #fdf8ea 0, transparent 30%),
        linear-gradient(180deg, #f4f1e9 0%, #ebe6da 100%);
    }
    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }
    h1, h2 { margin: 0 0 12px; }
    h1 { font-size: 34px; letter-spacing: 0.02em; }
    h2 { font-size: 16px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 16px;
      align-items: start;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 4px 18px rgba(43, 45, 40, 0.06);
    }
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      margin-bottom: 16px;
    }
    .status {
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .status.running { color: var(--accent); border-color: #9dc5b8; background: #edf8f4; }
    .status.done { color: var(--good); border-color: #aad2b0; background: #eef9ef; }
    .status.failed, .status.shutdown { color: var(--bad); border-color: #d5a1a8; background: #fff1f3; }
    .kv {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 6px 10px;
      font-size: 14px;
    }
    .kv .k { color: var(--muted); }
    .steps {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .steps th, .steps td {
      padding: 8px 6px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    .steps th { color: var(--muted); font-weight: 600; }
    .mono { font-family: var(--mono); }
    .events {
      display: grid;
      gap: 8px;
      max-height: 420px;
      overflow: auto;
    }
    .event {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
      font-size: 13px;
    }
    .event .top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font: 12px/1.4 var(--mono);
      background: #171917;
      color: #f2f0e8;
      border-radius: 12px;
      padding: 12px;
      max-height: 320px;
      overflow: auto;
    }
    .files {
      display: grid;
      gap: 6px;
      font-size: 14px;
    }
    .files .stale {
      color: #9a9a9a;
    }
    .files .fresh {
      color: var(--ink);
    }
    .file.clickable {
      cursor: pointer;
    }
    .controls {
      display: grid;
      gap: 12px;
    }
    .controls label {
      display: grid;
      gap: 6px;
      font-size: 14px;
      color: var(--muted);
    }
    .controls .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--ink);
    }
    .controls label.inline {
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 10px;
    }
    .controls select, .controls button {
      font: 14px var(--sans);
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
    }
    .controls button {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .controls button[disabled] {
      opacity: 0.6;
      cursor: wait;
    }
    .hint {
      font-size: 13px;
      color: var(--muted);
    }
    .file {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 6px;
    }
    .modal-shell {
      position: fixed;
      inset: 0;
      background: rgba(18, 20, 18, 0.42);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 50;
    }
    .modal-shell.open {
      display: flex;
    }
    .modal {
      width: min(1100px, 96vw);
      max-height: 88vh;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 16px 48px rgba(26, 28, 25, 0.22);
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }
    .modal-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #f7f3ea;
    }
    .modal-close {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 10px;
      padding: 8px 12px;
      font: 14px var(--sans);
      cursor: pointer;
    }
    .modal-body {
      padding: 16px;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .hero { flex-direction: column; align-items: start; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <h1>Pipeline Monitor</h1>
        <div id="subtitle" class="mono"></div>
      </div>
      <div id="run-status" class="status">unknown</div>
    </div>

    <div class="grid">
      <section class="panel">
        <h2>Run</h2>
        <div id="run-kv" class="kv"></div>
      </section>

      <section class="panel">
        <h2>Controls</h2>
        <div class="controls">
          <label>
            Pipeline
            <select id="pipeline-select"></select>
          </label>
          <label>
            Diary Story
            <select id="story-select"></select>
          </label>
          <label>
            Scene
            <select id="scene-select"></select>
          </label>
          <label>
            Arrival
            <select id="arrival-select"></select>
          </label>
          <label>
            Disturbance
            <select id="disturbance-select"></select>
          </label>
          <label>
            Reflection
            <select id="reflection-select"></select>
          </label>
          <label>
            Realization
            <select id="realization-select"></select>
          </label>
          <label class="checkbox-row">
            <input id="continuous-checkbox" type="checkbox">
            <span>Restart after 60 second cooldown until pipeline shutdown</span>
          </label>
          <button id="launch-button" type="button">Write Override And Run</button>
          <button id="kill-button" type="button">Kill Run</button>
          <div id="launch-result" class="hint mono"></div>
        </div>
      </section>

      <section class="panel">
        <h2>Outputs</h2>
        <div id="out-files" class="files"></div>
        <h2 style="margin-top:16px;">Diary Files</h2>
        <div id="diary-files" class="files"></div>
      </section>

      <section class="panel">
        <h2>Steps</h2>
        <table class="steps">
          <thead>
            <tr><th>Step</th><th>Status</th><th>Updated</th></tr>
          </thead>
          <tbody id="steps-body"></tbody>
        </table>
      </section>

      <section class="panel">
        <h2>Latest Log</h2>
        <pre id="latest-log"></pre>
      </section>

      <section class="panel">
        <h2>Latest Err</h2>
        <pre id="latest-err"></pre>
      </section>
    </div>
  </div>

  <div id="file-modal-shell" class="modal-shell">
    <div class="modal">
      <div class="modal-top">
        <div>
          <strong id="file-modal-title" class="mono"></strong>
          <div id="file-modal-meta" class="mono hint"></div>
        </div>
        <button id="file-modal-close" class="modal-close" type="button">X</button>
      </div>
      <div class="modal-body">
        <pre id="file-modal-text"></pre>
      </div>
    </div>
  </div>

  <script>
    const byId = (id) => document.getElementById(id);
    let launchBusy = false;
    let controlsDirty = false;
    let controlsInitialized = false;

    function formatLocalTime(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString(undefined, {
        year: 'numeric',
        month: 'short',
        day: '2-digit',
        hour: 'numeric',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    function renderKV(target, rows) {
      target.innerHTML = rows.map(([k, v]) => `
        <div class="k">${k}</div>
        <div class="mono">${v ?? ''}</div>
      `).join('');
    }

    function renderFiles(target, files) {
      if (!files || !files.length) {
        target.innerHTML = '<div class="mono">none</div>';
        return;
      }
      target.innerHTML = files.map((f) => `
        <div class="file clickable ${f.is_fresh ? 'fresh' : 'stale'}" data-path="${f.path || ''}">
          <span class="mono">${f.path || f.name}</span>
          <span class="mono">${f.exists ? (f.size ?? '') : 'missing'}</span>
        </div>
      `).join('');

      target.querySelectorAll('.file.clickable').forEach((node) => {
        node.addEventListener('dblclick', () => {
          const filePath = node.getAttribute('data-path');
          if (filePath) openFileModal(filePath).catch(console.error);
        });
      });
    }

    function renderControls(controls) {
      const pipelineSelect = byId('pipeline-select');
      const storySelect = byId('story-select');
      const sceneSelect = byId('scene-select');
      const arrivalSelect = byId('arrival-select');
      const disturbanceSelect = byId('disturbance-select');
      const reflectionSelect = byId('reflection-select');
      const realizationSelect = byId('realization-select');
      const pipelines = controls?.pipelines || [];
      const storyIds = controls?.diary_story_ids || [];
      const selectedPipeline = controls?.pipeline || '';
      const selectedStory = controls?.story_id || '';
      const selectedScene = controls?.scene || '';
      const selectedArrival = controls?.arrival || '';
      const selectedDisturbance = controls?.disturbance || '';
      const selectedReflection = controls?.reflection || '';
      const selectedRealization = controls?.realization || '';

      if (controlsDirty && controlsInitialized) {
        return;
      }

      const renderOptionList = (selectEl, rows, selectedValue) => {
        const base = ['<option value="">(default from story)</option>'];
        const items = (rows || []).map((row) => `
          <option value="${row.key}" ${row.key === selectedValue ? 'selected' : ''}>${row.label}</option>
        `);
        selectEl.innerHTML = base.concat(items).join('');
      };

      pipelineSelect.innerHTML = pipelines.map((name) => `
        <option value="${name}" ${name === selectedPipeline ? 'selected' : ''}>${name}</option>
      `).join('');

      storySelect.innerHTML = storyIds.map((name) => `
        <option value="${name}" ${name === selectedStory ? 'selected' : ''}>${name}</option>
      `).join('');

      renderOptionList(sceneSelect, controls?.scene_options, selectedScene);
      renderOptionList(arrivalSelect, controls?.arrival_options, selectedArrival);
      renderOptionList(disturbanceSelect, controls?.disturbance_options, selectedDisturbance);
      renderOptionList(reflectionSelect, controls?.reflection_options, selectedReflection);
      renderOptionList(realizationSelect, controls?.realization_options, selectedRealization);

      controlsInitialized = true;
    }

    function renderSteps(rows) {
      byId('steps-body').innerHTML = (rows || []).map((row) => `
        <tr>
          <td class="mono">${row.step || ''}</td>
          <td>${row.status || ''}</td>
          <td class="mono">${formatLocalTime(row.updated_at || row.finished_at || row.started_at || '')}</td>
        </tr>
      `).join('');
    }

    function renderKillButton(run) {
      const button = byId('kill-button');
      const pid = run?.pid;
      const status = run?.status || '';
      const blocking = Array.isArray(run?.other_runners) && run.other_runners.length > 0
        ? String(run.other_runners[0]).match(/^\s*(\d+)\b/)
        : null;
      const blockingPid = blocking ? blocking[1] : null;
      const killable = Number.isInteger(Number(pid)) && !['done', 'failed', 'shutdown'].includes(status);

      if (status === 'skipped' && blockingPid) {
        button.disabled = false;
        button.textContent = `Kill Blocking PID ${blockingPid}`;
        return;
      }

      if (killable) {
        button.disabled = false;
        button.textContent = `Kill PID ${pid}`;
        return;
      }

      button.disabled = true;
      if (pid) {
        button.textContent = `No Kill: PID ${pid} ${status}`.trim();
      } else {
        button.textContent = 'No Active Run';
      }
    }

    function renderContinuous(controls) {
      const box = byId('continuous-checkbox');
      if (controlsDirty) return;
      box.checked = controls?.continuous === true;
    }

    async function refresh() {
      const res = await fetch('/api/status', { cache: 'no-store' });
      const data = await res.json();
      const run = data.run || {};
      const pipelineState = data.pipeline_state || {};
      byId('subtitle').textContent = `${run.pipeline || ''}  ${run.hh_mm || ''}  ${run.logdir || ''}`.trim();
      const status = run.status || 'unknown';
      const statusEl = byId('run-status');
      statusEl.textContent = status;
      statusEl.className = `status ${status}`;

      renderKV(byId('run-kv'), [
        ['pipeline', run.pipeline],
        ['status', run.status],
        ['pid', run.pid],
        ['cwd', run.cwd],
        ['started', formatLocalTime(run.started_at)],
        ['finished', formatLocalTime(run.finished_at)],
        ['hh_mm', run.hh_mm],
        ['countdown', run.countdown_seconds ?? ''],
        ['shutdown by', pipelineState.by],
        ['shutdown reason', pipelineState.reason],
        ['shutdown at', formatLocalTime(pipelineState.timestamp)],
        ['latest log', data.latest_log_stem]
      ]);

      renderKillButton(run);
      renderContinuous(data.controls || {});
      renderControls(data.controls || {});
      renderFiles(byId('out-files'), data.out_files);
      renderFiles(byId('diary-files'), data.diary_files);
      renderSteps(data.steps);
      byId('latest-log').textContent = data.latest_log || '';
      byId('latest-err').textContent = data.latest_err || '';
    }

    function closeFileModal() {
      byId('file-modal-shell').classList.remove('open');
    }

    async function openFileModal(filePath) {
      const res = await fetch(`/api/file?path=${encodeURIComponent(filePath)}`, { cache: 'no-store' });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        throw new Error(data.error || 'file open failed');
      }
      const file = data.file || {};
      byId('file-modal-title').textContent = file.path || '';
      byId('file-modal-meta').textContent = `${file.size ?? 0} bytes  ${formatLocalTime(file.mtime || '')}`;
      byId('file-modal-text').textContent = file.text || '';
      byId('file-modal-shell').classList.add('open');
    }

    async function launchPipeline() {
      if (launchBusy) return;
      launchBusy = true;
      const launchButton = byId('launch-button');
      const result = byId('launch-result');
      launchButton.disabled = true;
      result.textContent = 'launching...';
      byId('latest-log').textContent = '';
      byId('latest-err').textContent = '';

      try {
        const payload = {
          pipeline: byId('pipeline-select').value,
          story_id: byId('story-select').value,
          scene: byId('scene-select').value,
          arrival: byId('arrival-select').value,
          disturbance: byId('disturbance-select').value,
          reflection: byId('reflection-select').value,
          realization: byId('realization-select').value,
          continuous: byId('continuous-checkbox').checked
        };
        const res = await fetch('/api/launch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok || !data.ok) {
          throw new Error(data.error || 'launch failed');
        }
        controlsDirty = false;
        result.textContent = `pid ${data.pid}  pipeline ${data.override?.pipeline || ''}`;
        await refresh();
      } catch (err) {
        result.textContent = String(err.message || err);
      } finally {
        launchBusy = false;
        launchButton.disabled = false;
      }
    }

    async function killPipeline() {
      const result = byId('launch-result');
      try {
        const res = await fetch('/api/kill', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        const data = await res.json();
        if (!res.ok || !data.ok) {
          throw new Error(data.error || 'kill failed');
        }
        result.textContent = `kill requested for pid ${data.pid}`;
        await refresh();
      } catch (err) {
        result.textContent = String(err.message || err);
      }
    }

    refresh().catch(console.error);
    setInterval(() => refresh().catch(console.error), 2000);
    byId('pipeline-select').addEventListener('change', () => {
      controlsDirty = true;
    });
    byId('story-select').addEventListener('change', () => {
      controlsDirty = true;
    });
    byId('scene-select').addEventListener('change', () => {
      controlsDirty = true;
    });
    byId('arrival-select').addEventListener('change', () => {
      controlsDirty = true;
    });
    byId('disturbance-select').addEventListener('change', () => {
      controlsDirty = true;
    });
    byId('reflection-select').addEventListener('change', () => {
      controlsDirty = true;
    });
    byId('realization-select').addEventListener('change', () => {
      controlsDirty = true;
    });
    byId('continuous-checkbox').addEventListener('change', () => {
      controlsDirty = true;
    });
    byId('launch-button').addEventListener('click', () => {
      launchPipeline().catch(console.error);
    });
    byId('kill-button').addEventListener('click', () => {
      killPipeline().catch(console.error);
    });
    byId('file-modal-close').addEventListener('click', closeFileModal);
    byId('file-modal-shell').addEventListener('click', (event) => {
      if (event.target === byId('file-modal-shell')) closeFileModal();
    });
  </script>
</body>
</html>
