<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pipeline Monitor</title>
  <style>
    :root {
      --bg: #f2efe8;
      --ink: #1d221f;
      --muted: #6b726d;
      --panel: #fffdf8;
      --line: #d7d1c2;
      --accent: #145a46;
      --warn: #8a5a00;
      --bad: #8a1f2a;
      --good: #1f6a3a;
      --mono: "SFMono-Regular", Menlo, Consolas, monospace;
      --sans: "Avenir Next", "Helvetica Neue", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--sans);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, #fdf8ea 0, transparent 30%),
        linear-gradient(180deg, #f4f1e9 0%, #ebe6da 100%);
    }
    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }
    h1, h2 { margin: 0 0 12px; }
    h1 { font-size: 34px; letter-spacing: 0.02em; }
    h2 { font-size: 16px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 16px;
      align-items: start;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 4px 18px rgba(43, 45, 40, 0.06);
    }
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      margin-bottom: 16px;
    }
    .status {
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .status.running { color: var(--accent); border-color: #9dc5b8; background: #edf8f4; }
    .status.done { color: var(--good); border-color: #aad2b0; background: #eef9ef; }
    .status.failed, .status.shutdown { color: var(--bad); border-color: #d5a1a8; background: #fff1f3; }
    .kv {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 6px 10px;
      font-size: 14px;
    }
    .kv .k { color: var(--muted); }
    .steps {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .steps th, .steps td {
      padding: 8px 6px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    .steps th { color: var(--muted); font-weight: 600; }
    .mono { font-family: var(--mono); }
    .events {
      display: grid;
      gap: 8px;
      max-height: 420px;
      overflow: auto;
    }
    .event {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
      font-size: 13px;
    }
    .event .top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font: 12px/1.4 var(--mono);
      background: #171917;
      color: #f2f0e8;
      border-radius: 12px;
      padding: 12px;
      max-height: 320px;
      overflow: auto;
    }
    .files {
      display: grid;
      gap: 6px;
      font-size: 14px;
    }
    .files .stale {
      color: #9a9a9a;
    }
    .files .fresh {
      color: var(--ink);
    }
    .file.clickable {
      cursor: pointer;
    }
    .controls {
      display: grid;
      gap: 12px;
    }
    .controls label {
      display: grid;
      gap: 6px;
      font-size: 14px;
      color: var(--muted);
    }
    .controls .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--ink);
    }
    .controls label.inline {
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 10px;
    }
    .controls select, .controls button {
      font: 14px var(--sans);
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
    }
    .controls textarea {
      font: 13px/1.45 var(--mono);
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      min-height: 260px;
      resize: vertical;
    }
    .yaml-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .yaml-pane {
      display: grid;
      gap: 8px;
    }
    .yaml-readonly {
      background: #f4efe4;
      color: #4a504d;
    }
    .controls button {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .controls button[disabled] {
      opacity: 0.6;
      cursor: wait;
    }
    .hint {
      font-size: 13px;
      color: var(--muted);
    }
    .file {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 6px;
    }
    .modal-shell {
      position: fixed;
      inset: 0;
      background: rgba(18, 20, 18, 0.42);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 50;
    }
    .modal-shell.open {
      display: flex;
    }
    .modal {
      width: min(1100px, 96vw);
      max-height: 88vh;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 16px 48px rgba(26, 28, 25, 0.22);
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }
    .modal-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #f7f3ea;
    }
    .modal-close {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 10px;
      padding: 8px 12px;
      font: 14px var(--sans);
      cursor: pointer;
    }
    .modal-body {
      padding: 16px;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .hero { flex-direction: column; align-items: start; }
      .yaml-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <h1>Pipeline Monitor</h1>
        <div id="subtitle" class="mono"></div>
      </div>
      <div id="run-status" class="status">unknown</div>
    </div>

    <div class="grid">
      <section class="panel">
        <h2>Run</h2>
        <div id="run-kv" class="kv"></div>
      </section>

      <section class="panel">
        <h2>Controls</h2>
        <div class="controls">
          <label>
            Pipeline
            <select id="pipeline-select"></select>
          </label>
          <div>
            <div class="hint" style="margin-bottom:6px;">Recipe UI Fields</div>
            <div id="ui-fields" class="controls"></div>
          </div>
          <label class="checkbox-row">
            <input id="continuous-checkbox" type="checkbox">
            <span>Restart after 60 second cooldown until pipeline shutdown</span>
          </label>
          <button id="launch-button" type="button">Write Override And Run</button>
          <button id="kill-button" type="button">Kill Run</button>
          <div id="launch-result" class="hint mono"></div>
        </div>
      </section>

      <section class="panel">
        <h2>Recipe And Override</h2>
        <div class="hint" style="margin-bottom:10px;">
          Left is the recipe background. Right is the queued foreground override that will be written for the next run.
        </div>
        <div class="yaml-grid">
          <div class="yaml-pane">
            <label>
              Recipe Background
              <textarea id="recipe-viewer" class="yaml-readonly" spellcheck="false" readonly></textarea>
            </label>
          </div>
          <div class="yaml-pane">
            <label>
              Queued Override
              <textarea id="override-editor" spellcheck="false"></textarea>
            </label>
            <div id="override-status" class="hint mono"></div>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>Outputs</h2>
        <div id="out-files" class="files"></div>
        <h2 style="margin-top:16px;">Diary Files</h2>
        <div id="diary-files" class="files"></div>
      </section>

      <section class="panel">
        <h2>Steps</h2>
        <table class="steps">
          <thead>
            <tr><th>Step</th><th>Status</th><th>Updated</th></tr>
          </thead>
          <tbody id="steps-body"></tbody>
        </table>
      </section>

      <section class="panel">
        <h2>Latest Log</h2>
        <pre id="latest-log"></pre>
      </section>

      <section class="panel">
        <h2>Latest Err</h2>
        <pre id="latest-err"></pre>
      </section>
    </div>
  </div>

  <div id="file-modal-shell" class="modal-shell">
    <div class="modal">
      <div class="modal-top">
        <div>
          <strong id="file-modal-title" class="mono"></strong>
          <div id="file-modal-meta" class="mono hint"></div>
        </div>
        <button id="file-modal-close" class="modal-close" type="button">X</button>
      </div>
      <div class="modal-body">
        <pre id="file-modal-text"></pre>
      </div>
    </div>
  </div>

  <script>
    const byId = (id) => document.getElementById(id);
    let launchBusy = false;
    let controlsDirty = false;
    let controlsInitialized = false;
    let overrideDirty = false;
    let overrideInitialized = false;
    let manualOverrideDirty = false;
    let saveTimer = null;

    function uiEditorHasFocus() {
      const active = document.activeElement;
      if (!active) return false;
      if (active === byId('override-editor')) return true;
      if (active === byId('pipeline-select')) return true;
      if (active === byId('continuous-checkbox')) return true;
      if (active.classList?.contains('ui-dropdown')) return true;
      if (active.classList?.contains('ui-checkbox')) return true;
      return false;
    }

    function formatLocalTime(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString(undefined, {
        year: 'numeric',
        month: 'short',
        day: '2-digit',
        hour: 'numeric',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    function renderKV(target, rows) {
      target.innerHTML = rows.map(([k, v]) => `
        <div class="k">${k}</div>
        <div class="mono">${v ?? ''}</div>
      `).join('');
    }

    function renderFiles(target, files) {
      if (!files || !files.length) {
        target.innerHTML = '<div class="mono">none</div>';
        return;
      }
      target.innerHTML = files.map((f) => `
        <div class="file clickable ${f.is_fresh ? 'fresh' : 'stale'}" data-path="${f.path || ''}">
          <span class="mono">${f.path || f.name}</span>
          <span class="mono">${f.exists ? (f.size ?? '') : 'missing'}</span>
        </div>
      `).join('');

      target.querySelectorAll('.file.clickable').forEach((node) => {
        node.addEventListener('dblclick', () => {
          const filePath = node.getAttribute('data-path');
          if (filePath) openFileModal(filePath).catch(console.error);
        });
      });
    }

    function renderControls(controls) {
      const pipelineSelect = byId('pipeline-select');
      const pipelines = controls?.pipelines || [];
      const selectedPipeline = controls?.pipeline || '';
      const uiFields = controls?.ui_fields || [];
      const uiTarget = byId('ui-fields');

      if ((controlsDirty || uiEditorHasFocus()) && controlsInitialized) {
        return;
      }

      pipelineSelect.innerHTML = pipelines.map((name) => `
        <option value="${name}" ${name === selectedPipeline ? 'selected' : ''}>${name}</option>
      `).join('');
      uiTarget.innerHTML = uiFields.map((field) => {
        if (field.type === 'checkbox') {
          return `
            <label class="checkbox-row">
              <input type="checkbox" class="ui-checkbox" data-path="${field.path}" ${field.value ? 'checked' : ''}>
              <span class="mono">${field.label}</span>
            </label>
          `;
        }
        if (field.type === 'dropdown') {
          const base = [`<option value="" ${!field.value ? 'selected' : ''}>(default)</option>`];
          const options = (field.options || []).map((row) => `
            <option value="${row.key}" ${row.key === field.value ? 'selected' : ''}>${row.label}</option>
          `);
          return `
            <label>
              ${field.label}
              <select class="ui-dropdown" data-path="${field.path}" data-current-value="${field.value || ''}">
                ${base.concat(options).join('')}
              </select>
            </label>
          `;
        }
        return '';
      }).join('');

      uiTarget.querySelectorAll('.ui-dropdown').forEach((node) => {
        const currentValue = node.getAttribute('data-current-value') || '';
        node.value = currentValue;
      });

      controlsInitialized = true;
    }

    function collectUiValues() {
      const rows = {};
      document.querySelectorAll('.ui-checkbox').forEach((node) => {
        const path = node.getAttribute('data-path');
        if (!path) return;
        rows[path] = node.checked;
      });
      document.querySelectorAll('.ui-dropdown').forEach((node) => {
        const path = node.getAttribute('data-path');
        if (!path) return;
        rows[path] = node.value;
      });
      return rows;
    }

    function renderOverrideEditor(controls) {
      const recipeViewer = byId('recipe-viewer');
      const editor = byId('override-editor');
      const recipeText = typeof controls?.recipe_text === 'string' ? controls.recipe_text : '';
      const text = typeof controls?.override_text === 'string' ? controls.override_text : '';
      recipeViewer.value = recipeText;
      if ((overrideDirty || uiEditorHasFocus()) && overrideInitialized) {
        return;
      }
      editor.value = text;
      overrideInitialized = true;
      byId('override-status').textContent = '';
    }

    function renderSteps(rows) {
      byId('steps-body').innerHTML = (rows || []).map((row) => `
        <tr>
          <td class="mono">${row.step || ''}</td>
          <td>${row.status || ''}</td>
          <td class="mono">${formatLocalTime(row.updated_at || row.finished_at || row.started_at || '')}</td>
        </tr>
      `).join('');
    }

    function renderKillButton(run) {
      const button = byId('kill-button');
      const pid = run?.pid;
      const status = run?.status || '';
      const blocking = Array.isArray(run?.other_runners) && run.other_runners.length > 0
        ? String(run.other_runners[0]).match(/^\s*(\d+)\b/)
        : null;
      const blockingPid = blocking ? blocking[1] : null;
      const killable = Number.isInteger(Number(pid)) && !['done', 'failed', 'shutdown'].includes(status);

      if (status === 'skipped' && blockingPid) {
        button.disabled = false;
        button.textContent = `Kill Blocking PID ${blockingPid}`;
        return;
      }

      if (killable) {
        button.disabled = false;
        button.textContent = `Kill PID ${pid}`;
        return;
      }

      button.disabled = true;
      if (pid) {
        button.textContent = `No Kill: PID ${pid} ${status}`.trim();
      } else {
        button.textContent = 'No Active Run';
      }
    }

    function renderContinuous(controls) {
      const box = byId('continuous-checkbox');
      if (controlsDirty) return;
      box.checked = controls?.continuous === true;
    }

    async function refresh() {
      const res = await fetch('/api/status', { cache: 'no-store' });
      const data = await res.json();
      const run = data.run || {};
      const pipelineState = data.pipeline_state || {};
      byId('subtitle').textContent = `${run.pipeline || ''}  ${run.hh_mm || ''}  ${run.logdir || ''}`.trim();
      const status = run.status || 'unknown';
      const statusEl = byId('run-status');
      statusEl.textContent = status;
      statusEl.className = `status ${status}`;

      renderKV(byId('run-kv'), [
        ['pipeline', run.pipeline],
        ['status', run.status],
        ['pid', run.pid],
        ['cwd', run.cwd],
        ['started', formatLocalTime(run.started_at)],
        ['finished', formatLocalTime(run.finished_at)],
        ['lora remaining', data.lora_remaining_count ?? ''],
        ['hh_mm', run.hh_mm],
        ['countdown', run.countdown_seconds ?? ''],
        ['shutdown by', pipelineState.by],
        ['shutdown reason', pipelineState.reason],
        ['shutdown at', formatLocalTime(pipelineState.timestamp)],
        ['latest log', data.latest_log_stem]
      ]);

      renderKillButton(run);
      renderContinuous(data.controls || {});
      renderControls(data.controls || {});
      renderOverrideEditor(data.controls || {});
      renderFiles(byId('out-files'), data.out_files);
      renderFiles(byId('diary-files'), data.diary_files);
      renderSteps(data.steps);
      byId('latest-log').textContent = data.latest_log || '';
      byId('latest-err').textContent = data.latest_err || '';
    }

    function closeFileModal() {
      byId('file-modal-shell').classList.remove('open');
    }

    async function openFileModal(filePath) {
      const res = await fetch(`/api/file?path=${encodeURIComponent(filePath)}`, { cache: 'no-store' });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        throw new Error(data.error || 'file open failed');
      }
      const file = data.file || {};
      byId('file-modal-title').textContent = file.path || '';
      byId('file-modal-meta').textContent = `${file.size ?? 0} bytes  ${formatLocalTime(file.mtime || '')}`;
      byId('file-modal-text').textContent = file.text || '';
      byId('file-modal-shell').classList.add('open');
    }

    async function launchPipeline() {
      if (launchBusy) return;
      launchBusy = true;
      const launchButton = byId('launch-button');
      const result = byId('launch-result');
      launchButton.disabled = true;
      result.textContent = 'launching...';
      byId('latest-log').textContent = '';
      byId('latest-err').textContent = '';

      try {
        const payload = {
          pipeline: byId('pipeline-select').value,
          ui_values: collectUiValues(),
          continuous: byId('continuous-checkbox').checked,
          override_text: byId('override-editor').value
        };
        const res = await fetch('/api/launch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok || !data.ok) {
          throw new Error(data.error || 'launch failed');
        }
        controlsDirty = false;
        overrideDirty = false;
        manualOverrideDirty = false;
        result.textContent = `pid ${data.pid}  pipeline ${data.override?.pipeline || ''}`;
        byId('override-status').textContent = 'override written for current run';
        await refresh();
      } catch (err) {
        result.textContent = String(err.message || err);
      } finally {
        launchBusy = false;
        launchButton.disabled = false;
      }
    }

    async function saveControlState() {
      const payload = {
        pipeline: byId('pipeline-select').value,
        ui_values: collectUiValues(),
        continuous: byId('continuous-checkbox').checked
      };

      if (manualOverrideDirty) {
        payload.override_text = byId('override-editor').value;
      }

      const res = await fetch('/api/control', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        throw new Error(data.error || 'control save failed');
      }
      controlsDirty = false;
      overrideDirty = false;
      if (manualOverrideDirty) {
        byId('override-status').textContent = 'queued manual override for next run';
      } else {
        byId('override-status').textContent = 'queued for next run';
      }
    }

    async function saveSingleUiField(node) {
      const path = node.getAttribute('data-path');
      if (!path) return;

      let value = '';
      if (node.classList.contains('ui-checkbox')) {
        value = node.checked;
      } else {
        value = node.value;
      }

      const payload = {
        pipeline: byId('pipeline-select').value,
        ui_values: {
          [path]: value
        },
        continuous: byId('continuous-checkbox').checked
      };

      if (manualOverrideDirty) {
        payload.override_text = byId('override-editor').value;
      }

      const res = await fetch('/api/control', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        throw new Error(data.error || 'single control save failed');
      }

      controlsDirty = false;
      overrideDirty = false;
      if (manualOverrideDirty) {
        byId('override-status').textContent = 'queued manual override for next run';
      } else {
        byId('override-status').textContent = 'queued for next run';
      }
    }

    function scheduleControlSave() {
      if (saveTimer) window.clearTimeout(saveTimer);
      saveTimer = window.setTimeout(() => {
        saveControlState().catch((err) => {
          byId('override-status').textContent = String(err.message || err);
        });
      }, 250);
    }

    async function killPipeline() {
      const result = byId('launch-result');
      try {
        const res = await fetch('/api/kill', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        const data = await res.json();
        if (!res.ok || !data.ok) {
          throw new Error(data.error || 'kill failed');
        }
        result.textContent = `kill requested for pid ${data.pid}`;
        await refresh();
      } catch (err) {
        result.textContent = String(err.message || err);
      }
    }

    refresh().catch(console.error);
    setInterval(() => refresh().catch(console.error), 2000);
    byId('pipeline-select').addEventListener('change', () => {
      controlsDirty = true;
      if (!manualOverrideDirty) overrideDirty = false;
      scheduleControlSave();
    });
    byId('continuous-checkbox').addEventListener('change', () => {
      controlsDirty = true;
      scheduleControlSave();
    });
    document.addEventListener('change', (event) => {
      if (!event.target.classList.contains('ui-checkbox') && !event.target.classList.contains('ui-dropdown')) return;
      controlsDirty = true;
      manualOverrideDirty = false;
      overrideDirty = false;
      byId('override-status').textContent = 'rebuilding override from recipe UI fields...';
      saveSingleUiField(event.target).catch((err) => {
        byId('override-status').textContent = String(err.message || err);
      });
    });
    byId('override-editor').addEventListener('input', () => {
      controlsDirty = true;
      overrideDirty = true;
      manualOverrideDirty = true;
      byId('override-status').textContent = 'editing queued override...';
      scheduleControlSave();
    });
    byId('launch-button').addEventListener('click', () => {
      launchPipeline().catch(console.error);
    });
    byId('kill-button').addEventListener('click', () => {
      killPipeline().catch(console.error);
    });
    byId('file-modal-close').addEventListener('click', closeFileModal);
    byId('file-modal-shell').addEventListener('click', (event) => {
      if (event.target === byId('file-modal-shell')) closeFileModal();
    });
  </script>
</body>
</html>
